services:
  backend:
    build:
      context: ./arknights-backend
    ports:
      - "3001:3001"
    environment:
      DB_PROVIDER: "sqlite"
      DATABASE_URL: "file:./prisma/dev.db"
      ADMIN_SECRET: "change_me"
    volumes:
      - ./arknights-backend/prisma:/app/prisma

  frontend:
    build:
      context: ./arknights-tracker
    environment:
      PUBLIC_API_BASE: "http://localhost:3001/api"
    ports:
      - "3000:3000"
    depends_on:
      - backend
