<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="%sveltekit.assets%/config.js"></script>
    
    <script>
        var isDark = localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#2a2a2a';
        } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = '#F0F2F4';
        }

        try {
            var lang = localStorage.getItem('user_locale');
            if (lang) {
                document.documentElement.lang = lang;
                if (lang !== 'en') {
                    var style = document.createElement('style');
                    style.id = 'i18n-hide';
                    style.textContent = 'body > div:not(#app-splash-screen) { opacity: 0; }';
                    document.head.appendChild(style);
                }
            }
        } catch(e) {}
    </script>
    
    <style>
        #app-splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #F0F2F4;
            transition: opacity 0.5s ease-out;
        }

        html.dark #app-splash-screen {
            background-color: #2a2a2a;
        }

        .splash-content {
            position: relative;
            display: inline-block;
        }

        .splash-image {
            width: 230px;
            max-width: 90vw;
            height: auto;
            display: block;
        }

        .spinner {
            position: absolute;
            top: 18%;
            right: 12%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            color: #21272C;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>

    %sveltekit.head%
</head>
