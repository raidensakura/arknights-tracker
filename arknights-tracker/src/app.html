<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="%sveltekit.assets%/config.js"></script>
    
    <script>
        var isDark = localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#2a2a2a';
        } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = '#F0F2F4';
        }

        try {
            var lang = localStorage.getItem('user_locale');
            if (lang) {
                document.documentElement.lang = lang;
                
                if (lang !== 'en') {
                    var style = document.createElement('style');
                    style.id = 'i18n-hide';
                    style.textContent = 'body { opacity: 0; }';
                    document.head.appendChild(style);
                }
            }
        } catch(e) {}
    </script>
    
    %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
